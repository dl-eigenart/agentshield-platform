name: Release SDK to PyPI

# Triggers on tags like v0.1.1, v0.2.0, v1.0.0
# Publishes via PyPI Trusted Publishers (OIDC) — no API token needed.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Verify tag matches package version
        working-directory: packages/agentshield-sdk
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag v$TAG does not match pyproject.toml version $PKG"
            exit 1
          fi
          echo "Tag $TAG matches package version $PKG"

      - name: Build sdist + wheel
        working-directory: packages/agentshield-sdk
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/agentshield-sdk/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agentshield-guard/
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via PyPI Trusted Publishers (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
