[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "agentshield-guard"
version = "0.1.2"
description = "Official Python SDK for AgentShield — runtime gateway for real-time prompt-injection and jailbreak detection in LLM agents."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [
    { name = "Eigenart Filmproduktion", email = "eigenart.filmproduction@gmail.com" },
]
keywords = [
    "agentshield",
    "prompt-injection",
    "llm-security",
    "ai-security",
    "guardrails",
    "jailbreak-detection",
    "runtime-gateway",
    "real-time-classifier",
    "llm-firewall",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.24,<1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "respx>=0.20",
    "mypy>=1.0",
    "ruff>=0.1",
]

[project.urls]
Homepage = "https://agentshield.pro"
Documentation = "https://agentshield.pro/#docs"
Source = "https://github.com/dl-eigenart/agentshield-platform"
Issues = "https://github.com/dl-eigenart/agentshield-platform/issues"
Changelog = "https://github.com/dl-eigenart/agentshield-platform/blob/main/packages/agentshield-sdk/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["agentshield"]

[tool.hatch.build.targets.sdist]
include = [
    "/agentshield",
    "/README.md",
    "/LICENSE",
    "/CHANGELOG.md",
    "/tests",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.9"
strict = true
warn_unused_ignores = true

[tool.ruff]
line-length = 100
target-version = "py38"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
